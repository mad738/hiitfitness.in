<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#121212"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="20%" r="70%">
      <stop offset="0" stop-color="#a3e635" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="1" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <g opacity="0.18">
    <path d="M0 720 H1600" stroke="#ffffff" stroke-width="2"/>
    <path d="M0 780 H1600" stroke="#ffffff" stroke-width="2"/>
    <path d="M0 840 H1600" stroke="#ffffff" stroke-width="2"/>
    <path d="M260 0 V1000" stroke="#ffffff" stroke-width="2"/>
    <path d="M520 0 V1000" stroke="#ffffff" stroke-width="2"/>
    <path d="M780 0 V1000" stroke="#ffffff" stroke-width="2"/>
    <path d="M1040 0 V1000" stroke="#ffffff" stroke-width="2"/>
    <path d="M1300 0 V1000" stroke="#ffffff" stroke-width="2"/>
  </g>
  <!-- barbell -->
  <g transform="translate(200 520)">
    <rect x="140" y="-22" width="920" height="44" rx="22" fill="url(#metal)"/>
    <rect x="80" y="-78" width="60" height="156" rx="12" fill="#1b1b1b" stroke="#2f2f2f" stroke-width="6"/>
    <rect x="0" y="-120" width="80" height="240" rx="16" fill="#121212" stroke="#3a3a3a" stroke-width="6"/>
    <rect x="1060" y="-78" width="60" height="156" rx="12" fill="#1b1b1b" stroke="#2f2f2f" stroke-width="6"/>
    <rect x="1120" y="-120" width="80" height="240" rx="16" fill="#121212" stroke="#3a3a3a" stroke-width="6"/>
    <rect x="300" y="-44" width="60" height="88" rx="12" fill="#a3e635" opacity="0.35"/>
    <rect x="840" y="-44" width="60" height="88" rx="12" fill="#22d3ee" opacity="0.22"/>
  </g>
  <text x="90" y="130" fill="#e7e5e4" font-family="ui-sans-serif, system-ui, -apple-system" font-size="56" font-weight="800">
    Strength Floor
  </text>
  <text x="90" y="190" fill="#a8a29e" font-family="ui-sans-serif, system-ui, -apple-system" font-size="28">
    Racks " Platforms " Dumbbells " Cables
  </text>
</svg>

