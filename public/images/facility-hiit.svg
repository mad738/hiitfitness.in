<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#141414"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="20%" r="70%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1c1c"/>
      <stop offset="1" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <!-- track -->
  <path d="M100 760 C480 640, 1120 880, 1500 740" fill="none" stroke="#2a2a2a" stroke-width="22" stroke-linecap="round"/>
  <path d="M100 760 C480 640, 1120 880, 1500 740" fill="none" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" opacity="0.45"/>
  <!-- timer cards -->
  <g transform="translate(220 290)">
    <rect width="520" height="310" rx="28" fill="url(#card)" stroke="#2a2a2a" stroke-width="6"/>
    <text x="46" y="110" fill="#e7e5e4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="72" font-weight="800">00:45</text>
    <text x="46" y="162" fill="#a8a29e" font-family="ui-sans-serif, system-ui" font-size="28">Work</text>
    <rect x="46" y="212" width="420" height="18" rx="9" fill="#2a2a2a"/>
    <rect x="46" y="212" width="300" height="18" rx="9" fill="#22d3ee" opacity="0.75"/>
  </g>
  <g transform="translate(840 360)">
    <rect width="520" height="310" rx="28" fill="url(#card)" stroke="#2a2a2a" stroke-width="6"/>
    <text x="46" y="110" fill="#e7e5e4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="72" font-weight="800">00:15</text>
    <text x="46" y="162" fill="#a8a29e" font-family="ui-sans-serif, system-ui" font-size="28">Rest</text>
    <rect x="46" y="212" width="420" height="18" rx="9" fill="#2a2a2a"/>
    <rect x="46" y="212" width="170" height="18" rx="9" fill="#fb923c" opacity="0.8"/>
  </g>
  <text x="90" y="130" fill="#e7e5e4" font-family="ui-sans-serif, system-ui, -apple-system" font-size="56" font-weight="800">
    HIIT Studio
  </text>
  <text x="90" y="190" fill="#a8a29e" font-family="ui-sans-serif, system-ui, -apple-system" font-size="28">
    Sleds " Bikes " Rowers " Circuits
  </text>
</svg>

