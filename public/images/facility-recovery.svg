<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#151515"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="18%" r="70%">
      <stop offset="0" stop-color="#fb923c" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <!-- yoga mat / recovery -->
  <g transform="translate(260 330)">
    <rect width="1080" height="430" rx="60" fill="url(#mat)" stroke="#2a2a2a" stroke-width="10"/>
    <rect x="64" y="64" width="952" height="302" rx="44" fill="#0c0c0c" stroke="#1f1f1f" stroke-width="8"/>
    <path d="M130 520 C360 380, 560 600, 780 460 C980 330, 1180 560, 1340 420" fill="none" stroke="#a3e635" stroke-width="10" opacity="0.35"/>
    <circle cx="240" cy="210" r="62" fill="#22d3ee" opacity="0.16"/>
    <circle cx="920" cy="250" r="72" fill="#fb923c" opacity="0.16"/>
  </g>
  <text x="90" y="130" fill="#e7e5e4" font-family="ui-sans-serif, system-ui, -apple-system" font-size="56" font-weight="800">
    Recovery + Mobility
  </text>
  <text x="90" y="190" fill="#a8a29e" font-family="ui-sans-serif, system-ui, -apple-system" font-size="28">
    Stretch " Roll " Reset " Repeat
  </text>
</svg>

